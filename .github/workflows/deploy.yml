name: Deploy to EC2 (PM2 Only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Node App to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Create Deployment Package
        run: |
          tar -czf deploy.tar.gz \
            server.js \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            src

      - name: Deploy to EC2 Server
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

            cd /var/www/express-app

            sudo chown -R $USER:$USER /var/www/express-app

            tar --overwrite -xzf /tmp/deploy.tar.gz -C /var/www/express-app
            rm /tmp/deploy.tar.gz

            npm ci --omit=dev

            if [ ! -f .env ]; then
              echo "NODE_ENV=production" > .env
              echo "PORT=8000" >> .env
              echo "MONGO_URI=mongodb://127.0.0.1:27017/user_service" >> .env
            fi

            mkdir -p logs

            if pm2 describe express-app > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
            fi

            pm2 save
          EOF

          rm private_key.pem

      - name: Verify Deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting for application to start..."
          sleep 10

          response=$(curl -s -o /dev/null -w "%{http_code}" http://${EC2_HOST}:8000/api/health)

          if [ "$response" = "200" ]; then
            echo "Deployment successful"
          else
            echo "Deployment failed"
            exit 1
          fi